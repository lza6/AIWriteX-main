<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试AI动态模板生成</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
            line-height: 1.8;
        }
        .header {
            background: linear-gradient(135deg, #e85d04 0%, #f48c06 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .content {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        .content strong {
            color: #e85d04;
            background: linear-gradient(180deg, transparent 70%, #faa30740 70%);
            padding: 0 4px;
        }
        .footer {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="header">
        <div style="opacity: 0.9; font-size: 14px; letter-spacing: 2px;">科技</div>
        <h1>测试AI动态模板生成</h1>
    </div>
    <div class="content">
        {content}
    </div>
    <div class="footer">
        <p>由 AIWriteX 智能生成</p>
    </div>
</body>
</html>
