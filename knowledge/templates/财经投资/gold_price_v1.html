<!DOCTYPE html>
<html lang="zh-CN">

<body>
    <section
        style="max-width: 100%; color: #333; font-family: 'Noto Serif SC', serif; margin: 0; padding: 0; overflow-x: hidden; line-height: 1.6;">

        <section
            style="background: linear-gradient(to right, #D4AF37, #FFC72C); padding: 25px 20px; color: #fff; display: flex; flex-wrap: wrap; align-items: flex-start; justify-content: space-between;">
            <section style="flex: 1; min-width: 200px;">
                <h1
                    style="font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); margin-bottom: 5px;">
                    {{title}}</h1>
                <section style="font-size: 24px; font-weight: 300;">{{subtitle}}</section>
            </section>
        </section>

        <section
            style="padding: 20px; margin: 20px 0; background: #fff; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.08);">
            <h2
                style="font-size: 20px; font-weight: 700; color: #D4AF37; margin-bottom: 15px; display: inline-block; position: relative;">
                现象呈现：历史性突破正在发生
                <span
                    style="display: block; width: 100%; height: 2px; background: linear-gradient(to right, #D4AF37, transparent); margin-top: 3px;"></span>
            </h2>

            <!-- SVG 图表：移除渐变，使用单一颜色填充 -->
            <section
                style="width: 100%; height: 180px; background: #f8f8f8; border-radius: 8px; margin-bottom: 20px; overflow: hidden;">
                <svg width="100%" height="100%" viewBox="0 0 400 200">
                    <!-- 使用单一颜色填充，替换 linearGradient -->
                    <path
                        d="M0,180 C30,170 60,150 90,160 C120,170 150,120 180,100 C210,80 240,60 270,65 C300,70 330,55 360,40 C390,25 400,20 400,20 L400,180 L0,180 Z"
                        fill="#D4AF37" fill-opacity="0.2" />
                    <path
                        d="M0,180 C30,170 60,150 90,160 C120,170 150,120 180,100 C210,80 240,60 270,65 C300,70 330,55 360,40 C390,25 400,20 400,20"
                        fill="none" stroke="#D4AF37" stroke-width="2" />
                    <circle cx="360" cy="40" r="4" fill="#D4AF37" />
                    <text x="20" y="30" fill="#888" font-size="12">{{chart_source}}</text>
                </svg>
            </section>

            <div class="content-body">{{content}}</div>
        </section>

        <section
            style="padding: 25px 20px; margin: 20px 0 30px; background: #fff; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.08);">
            <section
                style="background: linear-gradient(to right, #faf7f2, #f0e9d6); border-radius: 8px; padding: 20px;">
                <h3 style="font-size: 18px; color: #996515; margin-bottom: 15px; text-align: center; font-weight: 600;">
                    互动话题
                    #{{hashtag}}#</h3>
                <p style="font-size: 15px; margin-bottom: 15px; text-align: center;">欢迎在评论区分享：</p>
                {{interaction_content}}
            </section>

            <p style="font-size: 13px; color: #999; text-align: center; margin-top: 20px; font-style: italic;">
                （数据截止{{date}}，投资有风险，本文不构成建议）</p>
        </section>

    </section>
</body>

</html>
