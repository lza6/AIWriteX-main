global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "aiwritex-v21"

scrape_configs:
  - job_name: "ai-write-x"
    static_configs:
      - targets: ["localhost:7000"]
        labels:
          service: "main"
          environment: "production"
    metrics_path: "/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true

  - job_name: "node-exporter"
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          service: "system"

  - job_name: "redis"
    static_configs:
      - targets: ["localhost:9121"]
        labels:
          service: "cache"

  - job_name: "qdrant"
    static_configs:
      - targets: ["localhost:6333"]
        labels:
          service: "vector-db"
