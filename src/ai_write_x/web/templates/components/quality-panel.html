<!-- 内容质量检测面板 -->
<div id="quality-panel" class="quality-panel" style="display: none;">
    <div class="quality-header">
        <h3>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            内容质量检测
        </h3>
        <div class="quality-actions">
            <button id="close-quality-panel" class="btn-icon" title="关闭">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
    </div>

    <div class="quality-content">
        <!-- 评分总览 -->
        <div class="quality-overview">
            <div class="score-circle-container">
                <div class="score-circle" id="overall-score-circle">
                    <svg viewBox="0 0 100 100">
                        <circle class="score-bg" cx="50" cy="50" r="45" />
                        <circle class="score-progress" cx="50" cy="50" r="45" id="score-progress-ring" />
                    </svg>
                    <div class="score-value">
                        <span id="overall-score-value">--</span>
                        <span class="score-label">综合评分</span>
                    </div>
                </div>
            </div>

            <div class="key-metrics">
                <div class="metric-card ai-risk" id="ai-risk-card">
                    <div class="metric-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                    </div>
                    <div class="metric-info">
                        <span class="metric-value" id="ai-risk-value">--%</span>
                        <span class="metric-label">AI检测概率</span>
                    </div>
                    <div class="metric-status" id="ai-risk-status"></div>
                </div>

                <div class="metric-card originality" id="originality-card">
                    <div class="metric-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polygon
                                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                        </svg>
                    </div>
                    <div class="metric-info">
                        <span class="metric-value" id="originality-value">--</span>
                        <span class="metric-label">原创性</span>
                    </div>
                    <div class="metric-status" id="originality-status"></div>
                </div>
            </div>
        </div>

        <!-- 详细指标 -->
        <div class="quality-details">
            <h4>详细指标</h4>
            <div class="metrics-grid" id="metrics-grid">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 优化建议 -->
        <div class="quality-suggestions">
            <h4>优化建议</h4>
            <div class="suggestions-list" id="suggestions-list">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 优化进度 -->
        <div class="optimization-progress" id="optimization-progress" style="display: none;">
            <div class="progress-header">
                <h4>自动优化进度</h4>
                <span class="progress-iteration" id="progress-iteration">第 0/5 轮</span>
            </div>
            <div class="progress-bars">
                <div class="progress-item">
                    <span class="progress-label">综合评分</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-overall"></div>
                    </div>
                    <span class="progress-value" id="progress-overall-value">--</span>
                </div>
                <div class="progress-item">
                    <span class="progress-label">原创性</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-originality"></div>
                    </div>
                    <span class="progress-value" id="progress-originality-value">--</span>
                </div>
                <div class="progress-item">
                    <span class="progress-label">AI概率</span>
                    <div class="progress-bar-container">
                        <div class="progress-bar ai-bar" id="progress-ai"></div>
                    </div>
                    <span class="progress-value" id="progress-ai-value">--</span>
                </div>
            </div>
            <div class="progress-status" id="progress-status">
                <div class="status-spinner"></div>
                <span>正在分析内容...</span>
            </div>
        </div>

        <!-- 对比视图 -->
        <div class="comparison-view" id="comparison-view" style="display: none;">
            <h4>优化前后对比</h4>
            <div class="comparison-grid">
                <div class="comparison-item original">
                    <h5>原文</h5>
                    <div class="comparison-scores" id="original-scores"></div>
                </div>
                <div class="comparison-arrow">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </div>
                <div class="comparison-item optimized">
                    <h5>优化后</h5>
                    <div class="comparison-scores" id="optimized-scores"></div>
                </div>
            </div>
            <div class="improvement-summary" id="improvement-summary"></div>
        </div>

        <!-- 操作按钮 -->
        <div class="quality-actions-bottom">
            <button id="btn-auto-optimize" class="btn btn-primary">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
                </svg>
                自动优化
            </button>
            <button id="btn-compare" class="btn btn-secondary" style="display: none;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <line x1="12" y1="3" x2="12" y2="21" />
                </svg>
                对比结果
            </button>
            <button id="btn-apply-optimized" class="btn btn-success" style="display: none;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="20 6 9 17 4 12" />
                </svg>
                应用优化结果
            </button>
        </div>
    </div>
</div>
