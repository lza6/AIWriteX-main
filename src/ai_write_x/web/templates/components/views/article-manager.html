<div id="article-manager-view" class="view-content">
    <div class="manager-layout">
        <!-- 左侧状态分类树 -->
        <aside class="manager-sidebar">
            <div class="sidebar-header">
                <h3>文章状态</h3>
            </div>
            <div class="sidebar-tree" id="article-sidebar-tree"></div>
            <div class="sidebar-divider" style="border-top:1px solid var(--border-color,#e0e0e0);margin:12px 0"></div>
            <button class="sidebar-gallery-btn" id="image-gallery-btn"
                onclick="window.articleManager?.showImageGallery()"
                style="display:flex;align-items:center;gap:8px;padding:10px 16px;width:100%;background:none;border:none;cursor:pointer;border-radius:8px;color:var(--text-secondary);font-size:14px;transition:all .2s">
                <span>📸</span><span>图片库</span>
                <span id="image-count-badge"
                    style="margin-left:auto;background:var(--primary-color,#6c5ce7);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;display:none">0</span>
            </button>

            <div class="sidebar-header" style="margin-top:20px">
                <h3>AI 智理助手</h3>
            </div>
            <button class="btn btn-secondary btn-sm" id="smart-clean-btn"
                onclick="window.articleManager?.runSmartClean()"
                style="width:100%;margin-top:10px;justify-content:center;font-size:13px;border-style:dashed;border-color:var(--primary-color)">
                <span>🧹</span> 智能清理老旧文章
            </button>
        </aside>

        <!-- 主内容区 -->
        <main class="main-wrapper">
            <div class="manager-toolbar">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input type="text" id="article-search" placeholder="搜索文章...">
                </div>

                <div class="toolbar-actions">
                    <button class="btn btn-secondary btn-sm" onclick="window.articleManager?.loadArticles()"
                        title="刷新文章列表" style="margin-right: 12px; display: flex; align-items: center; gap: 4px;">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor">
                            <path d="M21 2v6h-6"></path>
                            <path d="M3 12a9 9 0 1 0 2.13-5.88L21 8"></path>
                        </svg>
                        刷新
                    </button>

                    <div class="view-toggle">
                        <button class="view-btn active" data-layout="grid" title="网格视图">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor">
                                <rect x="3" y="3" width="7" height="7" />
                                <rect x="14" y="3" width="7" height="7" />
                                <rect x="3" y="14" width="7" height="7" />
                                <rect x="14" y="14" width="7" height="7" />
                            </svg>
                        </button>
                        <button class="view-btn" data-layout="list" title="列表视图">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor">
                                <line x1="8" y1="6" x2="21" y2="6" />
                                <line x1="8" y1="12" x2="21" y2="12" />
                                <line x1="8" y1="18" x2="21" y2="18" />
                                <line x1="3" y1="6" x2="3.01" y2="6" />
                                <line x1="3" y1="12" x2="3.01" y2="12" />
                                <line x1="3" y1="18" x2="3.01" y2="18" />
                            </svg>
                        </button>
                    </div>

                    <!-- 批量操作按钮组 -->
                    <div class="batch-actions-group">
                        <button class="btn btn-secondary" id="batch-mode-toggle">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor">
                                <path d="M9 11l3 3L22 4" />
                                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
                            </svg>
                            <span class="batch-mode-text">批量操作</span>
                            <span class="batch-count" style="display: none;">(已选 0)</span>
                        </button>

                        <!-- 子按钮容器 -->
                        <div class="batch-sub-actions" style="display: none;">
                            <button class="btn btn-secondary" id="batch-select-all" title="全选当前列表文章">
                                全选
                            </button>
                            <button class="btn btn-secondary" id="batch-select-invert" title="反选当前列表文章">
                                反选
                            </button>
                            <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 4px;">
                            </div>
                            <button class="btn btn-primary" id="batch-publish">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor">
                                    <path d="M22 2L11 13" />
                                    <path d="M22 2l-7 20-4-9-9-4 20-7z" />
                                </svg>
                                批量发布
                            </button>
                            <button class="btn btn-danger" id="batch-delete">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor">
                                    <polyline points="3 6 5 6 21 6" />
                                    <path
                                        d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
                                </svg>
                                批量删除
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="manager-main">
                <div class="content-grid" id="article-content-grid"></div>
                <div class="image-gallery-container" id="image-gallery-container" style="display:none">
                    <div class="gallery-header"
                        style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                        <h3 style="margin:0;font-size:16px;display:flex;align-items:center;gap:8px">📸 图片库 <span
                                id="gallery-count" style="font-size:12px;color:var(--text-tertiary)"></span></h3>
                        <div style="display:flex;gap:8px">
                            <button class="btn btn-secondary btn-sm" onclick="window.articleManager?.loadImages()"
                                style="font-size:12px;padding:4px 12px">🔄 刷新</button>
                            <button class="btn btn-danger btn-sm" id="clear-all-images-btn"
                                onclick="window.articleManager?.clearAllImages()"
                                style="font-size:12px;padding:4px 12px">🗑️ 清空全部</button>
                            <button class="btn btn-secondary btn-sm" onclick="window.articleManager?.showArticleList()"
                                style="font-size:12px;padding:4px 12px">← 返回文章</button>
                        </div>
                    </div>
                    <div class="image-gallery-grid" id="image-gallery-grid"
                        style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px"></div>
                    <div id="image-gallery-empty"
                        style="display:none;text-align:center;padding:48px 0;color:var(--text-tertiary)">
                        <div style="font-size:48px;margin-bottom:12px">🖼️</div>
                        <p>暂无图片</p>
                        <p style="font-size:12px">生成文章时会自动创建配图</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
