<div id="scheduler-view" class="view-content view-container surface-card animate-enter" style="display: none;">
    <div class="view-header">
        <div class="header-main">
            <h2>定时任务管理器</h2>
            <p class="text-secondary">7x24小时自动化内容生成与发布调度中心</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="window.schedulerManager.openAddTaskModal()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新增任务
            </button>
            <button class="btn btn-secondary" onclick="window.schedulerManager.refreshData()">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6"></path>
                    <path d="M1 20v-6h6"></path>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                刷新
            </button>
        </div>
    </div>

    <div class="view-body">
        <!-- 统计面板 -->
        <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px;">
            <div class="stat-card surface-overlay">
                <div class="stat-value" id="scheduler-active-count">0</div>
                <div class="stat-label">运行中任务</div>
            </div>
            <div class="stat-card surface-overlay">
                <div class="stat-value" id="scheduler-total-count">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card surface-overlay">
                <div class="stat-value" id="scheduler-log-count">0</div>
                <div class="stat-label">今日执行次数</div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="section-card">
            <div class="section-header">
                <h3>任务队列</h3>
            </div>
            <div class="table-container">
                <table class="data-table" id="task-list-table">
                    <thead>
                        <tr>
                            <th>话题/主题</th>
                            <th>发布平台</th>
                            <th>执行时间</th>
                            <th>重复周期</th>
                            <th>状态</th>
                            <th>上次运行</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="scheduler-task-list">
                        <!-- 动态填入 -->
                        <tr>
                            <td colspan="7" class="text-center py-5">正在获取任务列表...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 运行日志 -->
        <div class="section-card" style="margin-top: 30px;">
            <div class="section-header">
                <h3>近期运行日志</h3>
            </div>
            <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>状态</th>
                            <th>详情</th>
                            <th>产物</th>
                        </tr>
                    </thead>
                    <tbody id="scheduler-log-list">
                        <!-- 动态填入 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 新增/编辑任务弹窗 -->
    <div id="task-edit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content surface-card" style="width: 500px;">
            <div class="modal-header">
                <h3 id="task-modal-title">新增定时任务</h3>
                <button class="modal-close" onclick="window.schedulerManager.closeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>话题/主题内容 <span class="text-secondary">(可选，留空则自动生成)</span></label>
                    <textarea id="task-topic" class="form-control" placeholder="请输入要生成的主题或关键词，或留空让AI自主发挥..."
                        rows="3"></textarea>
                </div>
                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>发布平台</label>
                        <select id="task-platform" class="form-control"
                            onchange="window.schedulerManager.checkPlatformConnection(this.value)">
                            <option value="wechat">微信公众号</option>
                            <option value="xiaohongshu">小红书</option>
                            <option value="zhihu">知乎</option>
                            <option value="toutiao">今日头条</option>
                        </select>
                        <div id="platform-verify-tip" style="font-size: 12px; margin-top: 4px; display: none;"></div>
                    </div>
                    <div class="form-group" style="width: 120px;">
                        <label>生成篇数</label>
                        <input type="number" id="task-article-count" class="form-control" value="1" min="1" max="10">
                    </div>
                </div>
                <div class="form-group">
                    <label>首次执行时间 <span class="required">*</span></label>
                    <div style="display: flex; gap: 10px;">
                        <input type="datetime-local" id="task-exec-time" class="form-control" style="flex: 1;">
                        <button class="btn btn-secondary btn-sm" onclick="window.schedulerManager.setDelayTime(10)"
                            style="white-space: nowrap;">10秒后</button>
                    </div>
                </div>
                <div class="form-row" style="display: flex; gap: 20px; margin-top: 10px;">
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="task-beautify" checked>
                            启用AI美化
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="task-recurring"
                                onchange="window.schedulerManager.toggleInterval(this.checked)">
                            周期性执行
                        </label>
                    </div>
                </div>
                <div id="task-interval-group" class="form-group" style="display: none;">
                    <label>执行间隔 (小时)</label>
                    <input type="number" id="task-interval" class="form-control" value="24" min="1">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="window.schedulerManager.closeModal()">取消</button>
                <button class="btn btn-primary" onclick="window.schedulerManager.saveTask()">保存任务</button>
            </div>
        </div>
    </div>
</div>
