<div id="creative-workshop-view" class="view-content">
    <div class="workshop-container">

        <!-- LOGO和欢迎语 -->
        <div class="workshop-header">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="grad-core" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#bd00ff;stop-opacity:1" />
                        </linearGradient>
                    </defs>

                    <circle class="orbit-path orbit-1" cx="32" cy="32" r="28" />

                    <circle class="orbit-path orbit-2" cx="32" cy="32" r="20" />

                    <path class="core-x" d="M24 24 L40 40 M40 24 L24 40" stroke="url(#grad-core)" stroke-width="6"
                        stroke-linecap="round" />

                    <circle cx="32" cy="32" r="4" fill="white">
                        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
                    </circle>
                </svg>
            </div>

            <h1 class="workshop-title">AIWriteX</h1>

            <div class="workshop-subtitle">
                <span class="subtitle-text">输入话题，唤醒无限创意</span>
                <span class="cursor-blink"></span>
            </div>
        </div>

        <!-- 主输入卡片 -->
        <div class="workshop-card">
            <!-- 大型输入框 -->
            <textarea id="topic-input" class="topic-input" placeholder="输入创作话题，留空自动获取热搜话题..." rows="4"></textarea>

            <!-- ComfyUI 风格节点进度条 (Phase 10) -->
            <div id="workflow-nodes" class="workflow-graph hidden">
                <div class="wf-node" data-stage="init">
                    <div class="wf-dot"></div>
                    <div class="wf-label">任务初始化</div>
                </div>
                <div class="wf-line"></div>
                <div class="wf-node" data-stage="spider">
                    <div class="wf-dot"></div>
                    <div class="wf-label">抓取&视觉解析</div>
                </div>
                <div class="wf-line"></div>
                <div class="wf-node" data-stage="planning">
                    <div class="wf-dot"></div>
                    <div class="wf-label">策划大纲</div>
                </div>
                <div class="wf-line"></div>
                <div class="wf-node" data-stage="writing">
                    <div class="wf-dot"></div>
                    <div class="wf-label">文章撰写</div>
                </div>
                <div class="wf-line"></div>
                <div class="wf-node" data-stage="review">
                    <div class="wf-dot"></div>
                    <div class="wf-label">终审与事实排查</div>
                </div>
                <div class="wf-line"></div>
                <div class="wf-node" data-stage="reflexion">
                    <div class="wf-dot"></div>
                    <div class="wf-label">优化重写(按需)</div>
                </div>
                <div class="wf-line"></div>
                <div class="wf-node" data-stage="visual">
                    <div class="wf-dot"></div>
                    <div class="wf-label">生图与排版</div>
                </div>
                <div class="wf-line"></div>
                <div class="wf-node" data-stage="retemplate" id="wf-node-retemplate" style="display:none;">
                    <div class="wf-dot"></div>
                    <div class="wf-label">AI 美化</div>
                </div>
                <div class="wf-line" id="wf-line-retemplate" style="display:none;"></div>
                <div class="wf-node" data-stage="done">
                    <div class="wf-dot"></div>
                    <div class="wf-label">完成</div>
                </div>
            </div>

            <!-- 底部工具栏 -->
            <div class="input-toolbar">
                <!-- 左侧功能按钮 -->
                <div class="toolbar-left">
                    <button id="reference-mode-btn" class="toolbar-btn">
                        <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                        </svg>
                        <span>借鉴模式</span>
                    </button>

                    <button id="log-progress-btn" class="toolbar-btn">
                        <svg class="btn-icon" viewBox="0 0 24 24">
                            <path d="M12 20h9" />
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                        </svg>
                        <span id="progress-text">运行日志</span>
                    </button>

                    <button id="live-preview-btn" class="toolbar-btn" title="实时预览生成中的文章">
                        <svg class="btn-icon" viewBox="0 0 24 24">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                            <polyline points="10 9 9 9 8 9" />
                        </svg>
                        <span>实时预览</span>
                    </button>
                </div>

                <!-- 右侧生成按钮 -->
                <div class="toolbar-right" style="display: flex; gap: 6px; align-items: center; flex-shrink: 0;">
                    <div class="batch-options" style="display: flex; gap: 6px; align-items: center;">
                        <span style="font-size: 12px; color: var(--text-secondary);">数量:</span>
                        <input type="number" id="article-count" min="1" max="20" value="1"
                            style="width: 42px; height: 30px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); text-align: center; font-size: 12px;">
                        <span style="font-size: 12px; color: var(--text-secondary);">完成后:</span>
                        <select id="post-action"
                            style="height: 30px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--bg-primary); color: var(--text-primary); font-size: 12px; padding: 0 6px;">
                            <option value="none">不操作</option>
                            <option value="save" selected>存草稿</option>
                            <option value="publish">发布</option>
                        </select>
                    </div>

                    <!-- V15.2: 过滤已处理话题开关 -->
                    <label class="auto-retemplate-toggle" title="自动过滤最近30天内已处理过的话题"
                        style="margin-right: 8px; color: var(--accent-color);">
                        <input type="checkbox" id="workshop-filter-processed">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">🔍 过滤已写</span>
                    </label>

                    <!-- AI 自动美化开关 -->
                    <label class="auto-retemplate-toggle" title="生成完成后自动执行 AI 换模板美化">
                        <input type="checkbox" id="auto-retemplate-switch">
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">🎨 AI美化</span>
                    </label>

                    <button id="generate-btn" class="generate-btn" style="white-space: nowrap;">
                        <svg class="btn-icon" viewBox="0 0 24 24">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                        </svg>
                        <span>开始生成</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 借鉴模式配置 -->
        <div id="reference-mode-panel" class="workshop-config-panel collapsed">
            <div class="panel-header">
                <h3 class="panel-title">
                    <svg class="panel-icon" viewBox="0 0 24 24">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                    </svg>
                    参数设置
                </h3>
            </div>

            <div class="panel-content">
                <div class="form-row">
                    <div class="form-group">
                        <label for="workshop-template-category">模板分类</label>
                        <select id="workshop-template-category" class="form-select">
                            <option value="">随机分类</option>
                            <!-- 动态加载分类选项 -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="workshop-template-name">模板名称</label>
                        <select id="workshop-template-name" class="form-select">
                            <option value="">随机模板</option>
                            <!-- 动态加载模板选项 -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reference-ratio">借鉴比例</label>
                        <select id="reference-ratio" class="form-select">
                            <option value="10">10%</option>
                            <option value="20">20%</option>
                            <option value="30" selected>30%</option>
                            <option value="50">50%</option>
                            <option value="75">75%</option>
                        </select>
                    </div>
                </div>

                <!-- 参考链接单独一行 -->
                <div class="form-group">
                    <label for="reference-urls">
                        参考链接
                        <span class="label-hint">(多个链接用 | 分隔)</span>
                    </label>
                    <textarea id="reference-urls" class="form-textarea"
                        placeholder="https://example.com/article1 | https://example.com/article2" rows="2"></textarea>
                </div>

                <!-- 选择热点文章借鉴 -->
                <div class="form-group">
                    <label for="reference-articles">
                        选择热点文章借鉴
                        <span class="label-hint">(选择后自动加载，无需手动点击)</span>
                    </label>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <select id="reference-articles" class="form-select" style="flex: 1;">
                            <option value="">-- 选择抓取的热点文章 --</option>
                        </select>
                        <button type="button" id="load-article-btn" class="btn btn-secondary btn-sm">
                            重新加载
                        </button>
                    </div>
                    <small class="form-help" style="margin-top: 4px; display: block;">
                        选择热点文章后自动提取话题和参考链接，进行深造创作
                    </small>
                </div>
            </div>
        </div>

        <!-- 生成进度区 -->
        <div id="generation-progress" class="workshop-config-panel collapsed">
            <div class="panel-header">
                <h3 class="panel-title">
                    <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    日志详情
                </h3>

                <!-- 新增:标题栏右侧按钮组 -->
                <div class="panel-header-actions">
                    <button id="copy-logs-btn" class="icon-btn" title="一键复制所有日志">
                        <svg class="btn-icon-small" viewBox="0 0 24 24">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                        </svg>
                    </button>
                    <button id="clear-logs-btn" class="icon-btn" title="清空日志">
                        <svg class="btn-icon-small" viewBox="0 0 24 24">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                    </button>
                    <button id="export-logs-btn" class="icon-btn" title="导出日志">
                        <svg class="btn-icon-small" viewBox="0 0 24 24">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="panel-content">
                <div id="logs-output" class="logs-output"></div>
            </div>
        </div>

        <!-- 质量分析面板 -->
        {% include 'components/quality-panel.html' %}

        <!-- 实时文章预览蒙版 (IDE Diff 风格) -->
        <div id="live-preview-panel" class="workshop-config-panel collapsed"
            style="min-height:300px;max-height:calc(100vh - 200px)">
            <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between">
                <h3 class="panel-title" style="display:flex;align-items:center;gap:8px">
                    <svg class="panel-icon" viewBox="0 0 24 24" style="width:16px;height:16px">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                    实时预览
                    <span id="live-preview-status"
                        style="font-size:11px;padding:2px 8px;border-radius:10px;background:var(--border-color);color:var(--text-tertiary)">等待生成</span>
                </h3>
                <div style="display:flex;gap:6px">
                    <button class="icon-btn" id="live-preview-scroll-btn" title="滚动到底部"
                        style="font-size:14px">⬇️</button>
                    <button class="icon-btn" id="live-preview-clear-btn" title="清空预览"
                        style="font-size:14px">🗑️</button>
                </div>
            </div>
            <div class="panel-content" style="overflow-y:auto;max-height:calc(100vh - 300px);padding:0">
                <div id="live-preview-content"
                    style="padding:16px;font-family:'Segoe UI','PingFang SC',sans-serif;font-size:14px;line-height:1.8;min-height:100px">
                    <div id="live-preview-placeholder"
                        style="text-align:center;padding:32px;color:var(--text-tertiary)">
                        <div style="font-size:36px;margin-bottom:8px">📄</div>
                        <p>点击“开始生成”后，文章内容将在此实时显示</p>
                        <p style="font-size:12px;margin-top:4px">类似 IDE 的 diff 面板，可观看 AI 写作过程</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
