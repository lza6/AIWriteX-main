<div id="newshub-view" class="view-content">
    <!-- 工具栏 -->
    <div class="newshub-toolbar">
        <div class="toolbar-left">
            <select id="nh-category-filter" class="toolbar-select">
                <option value="">全部分类</option>
                <option value="tech">科技</option>
                <option value="ai">AI/ML</option>
                <option value="programming">编程</option>
                <option value="finance">财经</option>
                <option value="social">社会</option>
                <option value="startup">创业</option>
            </select>
            <label class="toolbar-checkbox">
                <input type="checkbox" id="nh-auto-refresh">
                自动刷新
            </label>
            <label class="toolbar-checkbox" style="margin-left: 10px; color: var(--accent-color); font-weight: 500;">
                <input type="checkbox" id="nh-filter-processed">
                过滤已写话题
            </label>
        </div>
        <div class="toolbar-right">
            <span id="nh-last-update-display"
                style="font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px;">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span id="nh-last-update-time">尚未更新</span>
            </span>
            <button id="nh-refresh-btn" class="toolbar-btn primary" title="一键获取最新热点">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6" />
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                </svg>
                一键获取热点
            </button>
            <button id="nh-sources-btn" class="toolbar-btn">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                数据源
            </button>
        </div>
    </div>

    <!-- 统计概览 -->
    <div class="newshub-stats" id="newshub-stats">
        <div class="stat-card">
            <span class="stat-value" id="nh-sources-count">-</span>
            <span class="stat-label">数据源</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="nh-articles-count">-</span>
            <span class="stat-label">文章数</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="nh-trends-count">-</span>
            <span class="stat-label">热点趋势</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="nh-last-update">-</span>
            <span class="stat-label">最近更新</span>
        </div>
    </div>

    <!-- 趋势热词 -->
    <div class="newshub-section">
        <div class="section-title">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            热点趋势
        </div>
        <div class="trends-list" id="nh-trends-list">
            <div class="loading-placeholder">加载趋势中...</div>
        </div>
    </div>

    <!-- 热点新闻 -->
    <div class="newshub-section">
        <div class="section-title">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2">
                </path>
            </svg>
            热点新闻
            <span id="nh-news-count-badge"
                style="font-size: 12px; background: var(--accent-color); color: white; padding: 2px 8px; border-radius: 10px; margin-left: 8px;"></span>
        </div>
        <div class="news-list" id="nh-news-list">
            <div class="loading-placeholder">正在同步全网热点...</div>
        </div>
    </div>

    <!-- GitHub趋势 -->
    <div class="newshub-section">
        <div class="section-title">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path
                    d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
            </svg>
            GitHub 趋势
        </div>
        <div class="github-list" id="nh-github-list">
            <div class="loading-placeholder">加载GitHub趋势中...</div>
        </div>
    </div>

    <!-- 数据源配置模态框 -->
    <div id="nh-sources-modal" class="nh-modal-overlay">
        <div class="nh-modal-content">
            <div class="nh-modal-header">
                <h3 style="margin:0; font-size:18px;">数据源配置</h3>
                <button id="nh-sources-close" class="nh-modal-close">✕</button>
            </div>
            <div id="nh-sources-list" class="nh-sources-list-container"></div>
            <div style="text-align:right; margin-top:20px;">
                <button id="nh-sources-save" class="toolbar-btn primary">保存</button>
            </div>
        </div>
    </div>
</div>
