<!-- 预览面板触发按钮 -->
<div class="preview-trigger" id="preview-trigger">
    <div class="trigger-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" style="transform: scaleX(-1);">
            <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z" />
            <path d="M2.59 16.59L7.17 12 2.59 7.41 4 6l6 6-6 6-1.41-1.41z" />
        </svg>
    </div>
</div>

<!-- 悬浮预览面板组件 -->
<div class="preview-overlay" id="preview-overlay" style="display: none;">
    <div class="preview-panel mobile-width">
        <div class="preview-header">
            <h3 class="preview-title">内容预览</h3>
            <div class="preview-controls">
                <!-- 【新增】创意工坊专属操作按钮组 -->
                <div class="preview-actions" id="preview-actions" style="display: none;">
                    <button class="icon-btn" id="preview-edit-btn" title="编辑">
                        <svg class="btn-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                        </svg>
                    </button>
                    <button class="icon-btn" id="preview-design-btn" title="设计">
                        <svg class="btn-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                            <path d="M10 10l4 4" />
                        </svg>
                    </button>
                    <button class="icon-btn" id="preview-compare-btn" title="对比原稿">
                        <svg class="btn-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z">
                            </path>
                        </svg>
                    </button>
                    <button class="icon-btn" id="preview-publish-btn" title="发布">
                        <svg class="btn-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 2L11 13" />
                            <path d="M22 2l-7 20-4-9-9-4 20-7z" />
                        </svg>
                    </button>
                </div>

                <button class="preview-toggle-source" id="preview-toggle-source" title="显示源码">
                    <svg class="btn-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                </button>
                <button class="preview-copy-html" id="preview-copy-html" title="拷贝 HTML">
                    <svg class="btn-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                </button>
                <button class="preview-toggle-size" id="preview-toggle-size" title="切换尺寸">
                    📱
                </button>
                <button class="preview-close" id="preview-close">×</button>
            </div>
        </div>
        <div class="preview-content">
            <div class="preview-area" id="preview-area">
                <p class="preview-placeholder">内容预览将在这里显示</p>
            </div>
            <div class="preview-source-area" id="preview-source-area" style="display: none;">
                <textarea id="preview-source-code" readonly placeholder="HTML 源码将在这里显示"></textarea>
            </div>
        </div>
        <div class="preview-footer">
            <div class="preview-info">
                <span class="preview-size-info">375×667 (iPhone)</span>
            </div>
        </div>
    </div>
</div>
